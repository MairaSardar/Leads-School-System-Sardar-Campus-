<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contact page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="elearning.css">
</head>
<body >
  <section id="contact" class="mt-5">
    <h2 class="text-center mb-4">Contact Us</h2>
    <div class="row justify-content-center">
      <div class="col-md-6">
        <form id="contactForm">
          <div class="mb-3">
            <label for="name" class="form-label">Your Name</label>
            <input type="text" class="form-control" id="name" name="name" placeholder="Your Name" required>
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Your Email</label>
            <input type="email" class="form-control" id="email" name="email" placeholder="Your Email" required>
          </div>
          <div class="mb-3">
            <label for="message" class="form-label">Your Message</label>
            <textarea class="form-control" id="message" name="message" rows="4" placeholder="Your Message" required></textarea>
          </div>
          <button type="submit" class="btn btn-warning w-100">Send Message</button>
          <!-- Success message placeholder -->
          <div id="formMessage" class="mt-3 text-success" style="display:none; ">
            Thank you for contacting us! We will get back to you soon.
          </div>
        </form>
      </div>
    </div>
  </section>
  
  <!-- Footer Section -->
  <footer class="bg-dark text-light text-center py-3 mt-5">
    <div class="container">
      <p class="mb-1">&copy; 2025 Leads School System(Sardar Campus). All rights reserved.</p>
    </div>
  </footer>
  
  <!-- Optional: Add this script for demo form success message -->
  <script>
    document.getElementById('contactForm').addEventListener('submit', function(e) {
      e.preventDefault();
      document.getElementById('formMessage').style.display = 'block';
      this.reset();
    });
  </script>
  
      
</body>
</html>
